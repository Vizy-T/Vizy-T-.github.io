<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能学习平台 </title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .loader { animation: spin 1s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  .heat-item { width: 18px; height: 18px; border-radius: 4px; transition: 0.2s; }
  .card { transition: all 0.2s; }
  .card:hover { transform: translateY(-2px); }
  .character { transition: transform 0.2s; }
  .character:hover { transform: scale(1.1); }
</style>
</head>
<body class="bg-gray-100 transition-all" id="body">

<div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-50">
  <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full loader"></div>
</div>

<!-- 顶部导航栏 -->
<nav class="sticky top-0 bg-white dark:bg-gray-800 shadow z-40">
  <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
    <div class="text-lg font-bold text-blue-600 dark:text-blue-400">🎯 智能学习平台</div>
    <div class="flex items-center gap-2 md:gap-4">
      <button onclick="setTab('recommend')" class="text-sm px-2 py-1 rounded dark:text-white">题库</button>
      <button onclick="setTab('tasks')" class="text-sm px-2 py-1 rounded dark:text-white">任务</button>
      <button onclick="setTab('wrong')" class="text-sm px-2 py-1 rounded dark:text-white">错题</button>
      <button onclick="setTab('dashboard')" class="text-sm px-2 py-1 rounded dark:text-white">分析</button>
      <button onclick="toggleDark()" class="p-2 text-sm rounded-full bg-gray-100 dark:bg-gray-700 dark:text-white">
        切换模式
      </button>
    </div>
  </div>
</nav>

<!-- 左侧快捷 OJ 栏 -->
<div class="fixed left-0 top-16 bottom-0 w-44 bg-white dark:bg-gray-800 shadow-md p-3 z-30 hidden md:block overflow-y-auto">
  <div class="text-sm font-bold mb-3 text-gray-600 dark:text-gray-300">🔗 快速刷题入口</div>
  <div class="space-y-2">
    <a href="https://leetcode.cn" target="_blank" class="flex items-center gap-2 p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700 text-sm dark:text-white">
      <span>📘</span>力扣 LeetCode
    </a>
    <a href="https://www.nowcoder.com" target="_blank" class="flex items-center gap-2 p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700 text-sm dark:text-white">
      <span>⚔️</span>牛客 OJ
    </a>
    <a href="https://codeforces.com" target="_blank" class="flex items-center gap-2 p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700 text-sm dark:text-white">
      <span>⚡</span>Codeforces
    </a>
    <a href="https://atcoder.jp" target="_blank" class="flex items-center gap-2 p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700 text-sm dark:text-white">
      <span>🔥</span>AtCoder
    </a>
    <a href="https://www.lanqiao.cn" target="_blank" class="flex items-center gap-2 p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700 text-sm dark:text-white">
      <span>🔵</span>蓝桥云课
    </a>
    <a href="https://www.luogu.com.cn" target="_blank" class="flex items-center gap-2 p-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700 text-sm dark:text-white">
      <span>📕</span>洛谷
    </a>
  </div>

  <!-- 卡通励志人物 -->
  <div class="mt-6 pt-4 border-t dark:border-gray-700">
    <div class="text-xs font-medium text-center text-gray-500 dark:text-gray-400 mb-2">点击加油 ✨</div>
    <div onclick="showQuote()" class="character text-center text-2xl cursor-pointer">
      🐧
    </div>
    <div id="quoteBox" class="mt-2 text-xs text-center text-gray-600 dark:text-gray-300 min-h-[40px]"></div>
  </div>

  <!-- 各大OJ竞赛Rating量化分数（填满侧边栏） -->
  <div class="mt-6 pt-4 border-t dark:border-gray-700">
    <div class="text-xs font-bold mb-3 text-gray-600 dark:text-gray-300">📊 竞赛 Rating 量化</div>
    
    <div class="space-y-3 text-xs">
      <div>
        <div class="flex justify-between mb-1">
          <span>力扣</span>
          <span class="font-bold text-orange-500">1680</span>
        </div>
        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5">
          <div class="bg-orange-400 h-1.5 rounded-full" style="width: 65%"></div>
        </div>
      </div>

      <div>
        <div class="flex justify-between mb-1">
          <span>牛客</span>
          <span class="font-bold text-purple-500">2120</span>
        </div>
        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5">
          <div class="bg-purple-400 h-1.5 rounded-full" style="width: 72%"></div>
        </div>
      </div>

      <div>
        <div class="flex justify-between mb-1">
          <span>CF</span>
          <span class="font-bold text-blue-500">1350</span>
        </div>
        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5">
          <div class="bg-blue-400 h-1.5 rounded-full" style="width: 55%"></div>
        </div>
      </div>

      <div>
        <div class="flex justify-between mb-1">
          <span>AtCoder</span>
          <span class="font-bold text-green-500">900</span>
        </div>
        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5">
          <div class="bg-green-400 h-1.5 rounded-full" style="width: 40%"></div>
        </div>
      </div>

      <div>
        <div class="flex justify-between mb-1">
          <span>蓝桥杯</span>
          <span class="font-bold text-blue-400">省级二等奖</span>
        </div>
        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5">
          <div class="bg-blue-500 h-1.5 rounded-full" style="width: 60%"></div>
        </div>
      </div>

      <div>
        <div class="flex justify-between mb-1">
          <span>洛谷</span>
          <span class="font-bold text-yellow-500">6.2 分</span>
        </div>
        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5">
          <div class="bg-yellow-400 h-1.5 rounded-full" style="width: 62%"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="text-xs text-gray-400 mt-6 pt-2 border-t dark:border-gray-700">
    一键跳转专业 OJ 平台
  </div>
</div>

<!-- 主内容区（左边距适配侧边栏） -->
<div id="root" class="pt-4 md:ml-44"></div>

<script>
/* ================== 励志诗句库（5句循环） ================== */
const quotes = [
  "追风赶月莫停留，平芜尽处是春山",
  "路漫漫其修远兮，吾将上下而求索",
  "不经一番寒彻骨，怎得梅花扑鼻香",
  "长风破浪会有时，直挂云帆济沧海",
  "博观而约取，厚积而薄发"
];
let quoteIndex = 0;

/* ================== 显示诗句 ================== */
function showQuote() {
  const box = document.getElementById('quoteBox');
  box.innerText = quotes[quoteIndex];
  quoteIndex = (quoteIndex + 1) % quotes.length;
}

/* ================== 本地存储 ================== */
const Storage = {
  save: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
  load: (k) => JSON.parse(localStorage.getItem(k) || "null")
};

const today = new Date().toDateString();

/* ================== 初始化状态 ================== */
let state = Storage.load('studyState') || {};
state = {
  dark: false, lastCheckDate: "", streak: 0, checkedIn: false,
  finished: [], wrongList: [], starList: [], studyTime: 0,
  activeTab: "recommend", heat: Array.from({ length: 30 }, () => 0),
  tasks: [], taskInput: "", ...state
};

/* ================== 每日重置 ================== */
if (state.lastCheckDate !== today) {
  state.checkedIn = false;
  state.lastCheckDate = today;
  save();
}

/* ================== 50道算法题库 ================== */
const fullData = [
  { title: "数组区间和", difficulty: 1, url: "https://www.luogu.com.cn/problem/P3374", tags: ["数组"] },
  { title: "DFS迷宫", difficulty: 2, url: "https://www.luogu.com.cn/problem/P1605", tags: ["DFS"] },
  { title: "最短路", difficulty: 3, url: "https://www.luogu.com.cn/problem/P4779", tags: ["图论"] },
  { title: "背包问题", difficulty: 3, url: "https://www.luogu.com.cn/problem/P1048", tags: ["DP"] },
  { title: "单调队列", difficulty: 2, url: "https://www.luogu.com.cn/problem/P1886", tags: ["队列"] },
  { title: "并查集", difficulty: 2, url: "https://www.luogu.com.cn/problem/P3367", tags: ["图论"] },
  { title: "快速排序", difficulty: 2, url: "https://www.luogu.com.cn/problem/P1177", tags: ["排序"] },
  { title: "二分查找", difficulty: 1, url: "https://www.luogu.com.cn/problem/P2249", tags: ["二分"] },
  { title: "前缀和", difficulty: 1, url: "https://www.luogu.com.cn/problem/P1115", tags: ["数组"] },
  { title: "差分", difficulty: 2, url: "https://www.luogu.com.cn/problem/P2367", tags: ["数组"] },
  { title: "BFS广度优先", difficulty: 2, url: "https://www.luogu.com.cn/problem/P1443", tags: ["BFS"] },
  { title: "拓扑排序", difficulty: 3, url: "https://www.luogu.com.cn/problem/P1983", tags: ["图论"] },
  { title: "最小生成树", difficulty: 3, url: "https://www.luogu.com.cn/problem/P3366", tags: ["图论"] },
  { title: "LCA最近公共祖先", difficulty: 3, url: "https://www.luogu.com.cn/problem/P3379", tags: ["树"] },
  { title: "线段树", difficulty: 3, url: "https://www.luogu.com.cn/problem/P3372", tags: ["数据结构"] },
  { title: "树状数组2", difficulty: 3, url: "https://www.luogu.com.cn/problem/P3368", tags: ["数据结构"] },
  { title: "哈希表", difficulty: 2, url: "https://www.luogu.com.cn/problem/P3370", tags: ["字符串"] },
  { title: "KMP字符串", difficulty: 3, url: "https://www.luogu.com.cn/problem/P3375", tags: ["字符串"] },
  { title: "贪心", difficulty: 2, url: "https://www.luogu.com.cn/problem/P1090", tags: ["贪心"] },
  { title: "分治", difficulty: 2, url: "https://www.luogu.com.cn/problem/P1226", tags: ["数学"] },
  { title: "高精度加法", difficulty: 2, url: "https://www.luogu.com.cn/problem/P1601", tags: ["高精度"] },
  { title: "高精度乘法", difficulty: 2, url: "https://www.luogu.com.cn/problem/P1303", tags: ["高精度"] },
  { title: "质数筛", difficulty: 2, url: "https://www.luogu.com.cn/problem/P3383", tags: ["数学"] },
  { title: "快速幂", difficulty: 2, url: "https://www.luogu.com.cn/problem/P1226", tags: ["数学"] },
  { title: "最长上升子序列", difficulty: 3, url: "https://www.luogu.com.cn/problem/P1020", tags: ["DP"] },
  { title: "最长公共子序列", difficulty: 3, url: "https://www.luogu.com.cn/problem/P1439", tags: ["DP"] },
  { title: "区间DP", difficulty: 3, url: "https://www.luogu.com.cn/problem/P1880", tags: ["DP"] },
  { title: "数位DP", difficulty: 4, url: "https://www.luogu.com.cn/problem/P2657", tags: ["DP"] },
  { title: "状压DP", difficulty: 4, url: "https://www.luogu.com.cn/problem/P1879", tags: ["DP"] },
  { title: "树形DP", difficulty: 4, url: "https://www.luogu.com.cn/problem/P1352", tags: ["DP"] },
  { title: "双指针", difficulty: 2, url: "https://www.luogu.com.cn/problem/P1102", tags: ["双指针"] },
  { title: "滑动窗口", difficulty: 2, url: "https://www.luogu.com.cn/problem/P1886", tags: ["滑动窗口"] },
  { title: "离线处理", difficulty: 3, url: "https://www.luogu.com.cn/problem/P1972", tags: ["算法"] },
  { title: "莫队算法", difficulty: 4, url: "https://www.luogu.com.cn/problem/P3901", tags: ["算法"] },
  { title: "CDQ分治", difficulty: 4, url: "https://www.luogu.com.cn/problem/P3810", tags: ["算法"] },
  { title: "矩阵快速幂", difficulty: 3, url: "https://www.luogu.com.cn/problem/P3390", tags: ["数学"] },
  { title: "高斯消元", difficulty: 3, url: "https://www.luogu.com.cn/problem/P3389", tags: ["数学"] },
  { title: "组合数学", difficulty: 3, url: "https://www.luogu.com.cn/problem/P2822", tags: ["数学"] },
  { title: "博弈论", difficulty: 3, url: "https://www.luogu.com.cn/problem/P2148", tags: ["数学"] },
  { title: "Tarjan强连通", difficulty: 3, url: "https://www.luogu.com.cn/problem/P2863", tags: ["图论"] },
  { title: "割点割边", difficulty: 3, url: "https://www.luogu.com.cn/problem/P3388", tags: ["图论"] },
  { title: "2-SAT", difficulty: 4, url: "https://www.luogu.com.cn/problem/P4782", tags: ["图论"] },
  { title: "差分约束", difficulty: 3, url: "https://www.luogu.com.cn/problem/P5960", tags: ["图论"] },
  { title: "欧拉路径", difficulty: 3, url: "https://www.luogu.com.cn/problem/P7771", tags: ["图论"] },
  { title: "基环树", difficulty: 3, url: "https://www.luogu.com.cn/problem/P6037", tags: ["树"] },
  { title: "主席树", difficulty: 4, url: "https://www.luogu.com.cn/problem/P3834", tags: ["数据结构"] },
  { title: "平衡树", difficulty: 4, url: "https://www.luogu.com.cn/problem/P3369", tags: ["数据结构"] },
  { title: "后缀数组", difficulty: 4, url: "https://www.luogu.com.cn/problem/P3809", tags: ["字符串"] },
  { title: "AC自动机", difficulty: 4, url: "https://www.luogu.com.cn/problem/P3808", tags: ["字符串"] },
  { title: "马拉车算法", difficulty: 3, url: "https://www.luogu.com.cn/problem/P3805", tags: ["字符串"] }
];

/* ================== 智能推荐 ================== */
function getRecommend() {
  return [...fullData].map(p => {
    let score = 0;
    if (!state.finished.includes(p.url)) score += 3;
    if (state.wrongList.includes(p.url)) score += 5;
    score += (4 - p.difficulty);
    return { ...p, score };
  }).sort((a, b) => b.score - a.score).slice(0, 3);
}

/* ================== 工具 ================== */
function calcAcc() {
  const t = state.finished.length, w = state.wrongList.length;
  return t ? Math.round((t - w) / t * 100) : 0;
}

function getAchievement() {
  const n = state.finished.length;
  if (n >= 30) return "🏅 算法大神";
  if (n >= 20) return "🥇 金牌选手";
  if (n >= 10) return "🥈 银牌选手";
  return "🌱 新手入门";
}

/* ================== 渲染 ================== */
function render() {
  document.getElementById("body").className = state.dark 
    ? "bg-gray-900 text-white dark:text-white" 
    : "bg-gray-100";
  
  const rec = getRecommend(), acc = calcAcc(), ach = getAchievement();

  root.innerHTML = `
  <div class="max-w-5xl mx-auto p-4 space-y-4">
    <h1 class="text-2xl font-bold">🎯 智能学习平台 </h1>

    <!-- 打卡卡片 -->
    <div class="card bg-white dark:bg-gray-800 p-6 rounded-xl shadow flex flex-col md:flex-row md:justify-between md:items-center gap-4">
      <div class="space-y-2">
        <div class="text-lg font-semibold text-blue-600 dark:text-blue-400">🏅 学习打卡</div>
        <div class="flex items-center gap-3 text-sm">
          <span>连续打卡 <b class="text-blue-600 dark:text-blue-400">${state.streak}</b> 天</span>
          <span>|</span>
          <span>${ach}</span>
        </div>
        <div class="text-xs text-blue-500 dark:text-blue-300 italic">
          ${state.streak === 0 ? "🌱 今日还未打卡" : state.streak < 7 ? "💪 坚持学习！" : "🔥 太自律了！"}
        </div>
      </div>
      <button onclick="checkIn()" class="px-5 py-2 rounded-lg text-white font-medium ${state.checkedIn ? 'bg-green-500' : 'bg-blue-500'}">
        ${state.checkedIn ? '✅ 今日已打卡' : '📅 点击打卡'}
      </button>
    </div>

    <!-- 统计 -->
    <div class="grid grid-cols-3 gap-3">
      <div class="card bg-white dark:bg-gray-800 p-4 rounded-xl shadow text-center">
        <div class="text-sm text-gray-500 dark:text-gray-300">已完成</div>
        <div class="text-xl font-bold">${state.finished.length}</div>
      </div>
      <div class="card bg-white dark:bg-gray-800 p-4 rounded-xl shadow text-center">
        <div class="text-sm text-gray-500 dark:text-gray-300">错题</div>
        <div class="text-xl font-bold">${state.wrongList.length}</div>
      </div>
      <div class="card bg-white dark:bg-gray-800 p-4 rounded-xl shadow text-center">
        <div class="text-sm text-gray-500 dark:text-gray-300">正确率</div>
        <div class="text-xl font-bold">${acc}%</div>
      </div>
    </div>

    <!-- 推荐 -->
    <div class="card bg-white dark:bg-gray-800 p-4 rounded-xl shadow">
      <div class="font-bold mb-3">🔥 智能推荐</div>
      ${rec.map(p => `
        <div class="flex justify-between py-2 border-b dark:border-gray-700">
          <span>${p.title}</span>
          <a href="${p.url}" target="_blank" class="text-blue-500 dark:text-blue-400">去做题</a>
        </div>
      `).join('')}
    </div>

    <!-- 热力图 -->
    <div class="card bg-white dark:bg-gray-800 p-4 rounded-xl shadow">
      <div class="font-bold mb-3">🔥 30天学习热力图</div>
      <div class="flex flex-wrap gap-1">
        ${state.heat.map(v => `<div class="heat-item" style="background:hsl(120,60%,${90 - v * 15}%)"></div>`).join('')}
      </div>
    </div>

    <!-- 标签 -->
    <div class="grid grid-cols-4 gap-2 bg-white dark:bg-gray-800 p-2 rounded-xl">
      <button onclick="setTab('recommend')" class="py-2 rounded ${state.activeTab === 'recommend' ? 'bg-gray-100 dark:bg-gray-700' : ''}">题库</button>
      <button onclick="setTab('tasks')" class="py-2 rounded ${state.activeTab === 'tasks' ? 'bg-gray-100 dark:bg-gray-700' : ''}">任务</button>
      <button onclick="setTab('wrong')" class="py-2 rounded ${state.activeTab === 'wrong' ? 'bg-gray-100 dark:bg-gray-700' : ''}">错题</button>
      <button onclick="setTab('dashboard')" class="py-2 rounded ${state.activeTab === 'dashboard' ? 'bg-gray-100 dark:bg-gray-700' : ''}">分析</button>
    </div>

    <div>${renderTab()}</div>
  </div>`;
}

/* ================== 标签页 ================== */
function renderTab() {
  if (state.activeTab === 'recommend') {
    return `<div class="card bg-white dark:bg-gray-800 p-4 rounded-xl shadow space-y-3 max-h-[500px] overflow-y-auto">
      ${fullData.map(p => `
        <div class="p-3 border rounded-lg dark:border-gray-700">
          <div class="font-bold">${p.title}</div>
          <div class="text-xs text-gray-500 dark:text-gray-400">#${p.tags[0]}</div>
          <div class="text-sm ${p.difficulty===1?'text-green-500 dark:text-green-400':p.difficulty===2?'text-yellow-500 dark:text-yellow-400':'text-red-500 dark:text-red-400'}">难度 ${p.difficulty}</div>
          <div class="flex gap-3 mt-2 text-sm flex-wrap">
            <a href="${p.url}" target="_blank" class="text-blue-500 dark:text-blue-400">做题</a>
            <button onclick="toggleFinish('${p.url}')" class="${state.finished.includes(p.url)?"text-green-600 dark:text-green-400":"text-gray-400 dark:text-gray-500"}">完成</button>
            <button onclick="toggleWrong('${p.url}')" class="${state.wrongList.includes(p.url)?"text-red-600 dark:text-red-400":"text-gray-400 dark:text-gray-500"}">错题</button>
            <button onclick="toggleStar('${p.url}')" class="${(state.starList||[]).includes(p.url)?"text-yellow-600 dark:text-yellow-400":"text-gray-400 dark:text-gray-500"}">收藏</button>
          </div>
        </div>
      `).join('')}</div>`;
  }

  if (state.activeTab === 'tasks') {
    return `
    <div class="card bg-white dark:bg-gray-800 p-4 rounded-xl shadow">
      <div class="flex gap-2 mb-3">
        <input id="taskInput" value="${state.taskInput}" oninput="state.taskInput=this.value" placeholder="输入任务" class="flex-1 p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600">
        <button onclick="addTask()" class="px-3 py-2 bg-blue-500 text-white rounded-lg">添加</button>
      </div>
      <div class="space-y-2">
        ${state.tasks.map((t,i)=>`
          <label class="flex items-center gap-2 p-2 bg-gray-50 dark:bg-gray-700 rounded-lg">
            <input type="checkbox" ${t.done?"checked":""} onchange="toggleTask(${i})">
            <span class="${t.done?"line-through text-gray-400 dark:text-gray-500":""}">${t.text}</span>
          </label>
        `).join('')}
      </div>
    </div>`;
  }

  if (state.activeTab === 'wrong') {
    return `
    <div class="card bg-white dark:bg-gray-800 p-4 rounded-xl shadow space-y-4">
      <div><div class="font-bold mb-2">📕 错题本</div>
        ${fullData.filter(p=>state.wrongList.includes(p.url)).map(p=>`<div class="p-2 bg-red-50 dark:bg-red-900/30 rounded-lg mb-1">${p.title}</div>`).join('')}
      </div>
      <div><div class="font-bold mb-2">⭐ 收藏</div>
        ${fullData.filter(p=>(state.starList||[]).includes(p.url)).map(p=>`<div class="p-2 bg-yellow-50 dark:bg-yellow-900/30 rounded-lg mb-1">${p.title}</div>`).join('')}
      </div>
    </div>`;
  }

  if (state.activeTab === 'dashboard') {
    return `
    <div class="card bg-white dark:bg-gray-800 p-4 rounded-xl shadow space-y-4">
      <div class="text-sm bg-blue-50 dark:bg-blue-900/30 p-3 rounded-lg">
        📊 学习建议：${calcAcc()<60?"基础薄弱，多练基础题":calcAcc()<85?"稳步提升":"掌握良好，挑战难题"}
      </div>
      <div class="text-center">总题量：50 题 | 已刷：${state.finished.length}</div>
    </div>`;
  }
  return "";
}

/* ================== 功能 ================== */
function setTab(t){ state.activeTab = t; save(); }
function toggleDark(){ state.dark = !state.dark; save(); }

function checkIn(){
  if(state.checkedIn) return;
  state.checkedIn = true; state.streak++;
  state.heat.shift(); state.heat.push(Math.min(4, state.finished.length%5));
  save();
}

function toggleFinish(u){
  state.finished = state.finished.includes(u) ? state.finished.filter(x=>x!==u) : [...state.finished,u];
  save();
}

function toggleWrong(u){
  state.wrongList = state.wrongList.includes(u) ? state.wrongList.filter(x=>x!==u) : [...state.wrongList,u];
  save();
}

function toggleStar(u){
  if(!state.starList) state.starList = [];
  state.starList = state.starList.includes(u) ? state.starList.filter(x=>x!==u) : [...state.starList,u];
  save();
}

function addTask(){
  if(!state.taskInput.trim()) return;
  state.tasks.push({text:state.taskInput,done:false}); state.taskInput=""; save();
}

function toggleTask(i){
  state.tasks[i].done = !state.tasks[i].done; save();
}

function save(){
  Storage.save("studyState",state); render();
}

/* ================== 启动 ================== */
setTimeout(()=>{
  document.getElementById("loading").style.display="none";
  render();
},300);
</script>
</body>
</html>

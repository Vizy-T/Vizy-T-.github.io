<!DOCTYPE html>

<style>

  .card { transition: all 0.3s ease; backdrop-filter: blur(8px); }
  .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.1); }
  .character { transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer; }
  .character:hover { transform: scale(1.2); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }

  .text-quote-light { color: #4b5563; }
  .text-quote-dark { color: #cbd5e1; }
</style>
</head>
<body class="bg-gray-100 transition-all duration-300" id="body">

<div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-50">
  <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full loader"></div>
</div>

    <div class="text-center mb-8">
      <div class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent mb-2">凌云逐竞算法平台</div>
      <div class="text-sm text-gray-500 dark:text-gray-400">深耕算法 · 逐梦竞赛 · 高效刷题</div>
    </div>
    <div class="space-y-5 mb-7">
      <input 
        id="loginUser" 
        placeholder="请输入用户名" 
        class="w-full px-4 py-3.5 bg-gray-100/80 dark:bg-gray-700/80 border-0 rounded-xl outline-none transition-all focus:ring-2 focus:ring-indigo-400 dark:text-white"
      >
      <input 
        id="loginPwd" 
        type="password" 
        placeholder="请输入密码" 
        class="w-full px-4 py-3.5 bg-gray-100/80 dark:bg-gray-700/80 border-0 rounded-xl outline-none transition-all focus:ring-2 focus:ring-indigo-400 dark:text-white"
      >
    </div>
    <div class="flex gap-4 mb-6">
      <button onclick="userLogin()" class="flex-1 py-3.5 bg-gradient-to-r from-blue-500 to-indigo-500 hover:from-blue-600 hover:to-indigo-600 text-white font-medium rounded-xl transition-all shadow-lg shadow-indigo-500/25">
        立即登录
      </button>
      <button onclick="userRegister()" class="flex-1 py-3.5 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-medium rounded-xl transition-all shadow-lg shadow-teal-500/25">
        注册账号
      </button>
    </div>
    <div id="loginMsg" class="h-5 text-sm text-center text-red-500"></div>
  </div>
</div>


<div id="problemModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center">
  <div class="bg-white/95 dark:bg-gray-800/95 w-full max-w-3xl max-h-[80vh] overflow-auto p-6 rounded-2xl m-4 border border-gray-200 dark:border-gray-700">
    <div id="problemDetail"></div>
    <button onclick="closeProblem()" class="mt-4 w-full bg-gray-200/80 dark:bg-gray-700/80 p-3 rounded-xl transition-all">关闭</button>
  </div>
</div>


<nav class="sticky top-0 bg-white/90 dark:bg-gray-800/90 backdrop-blur-md shadow-md z-40">
  <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
    <div class="text-lg font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">🎯 凌云逐竞算法平台</div>
    <div class="flex items-center gap-2 md:gap-3">
      <button onclick="setTab('recommend')" class="text-sm px-3 py-1.5 rounded-md dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 transition-all">题库</button>
      <button onclick="setTab('tasks')" class="text-sm px-3 py-1.5 rounded-md dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 transition-all">任务</button>
      <button onclick="setTab('wrong')" class="text-sm px-3 py-1.5 rounded-md dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 transition-all">错题</button>

      <button onclick="toggleDark()" class="p-2 text-sm rounded-full bg-gray-100 dark:bg-gray-700 dark:text-white transition-all">🌙</button>
      <button onclick="logout()" class="text-sm px-3 py-1.5 rounded-md bg-red-100 text-red-600 hidden transition-all" id="logoutBtn">退出</button>
    </div>
  </div>
</nav>


<div class="fixed left-0 top-16 bottom-0 w-48 bg-white/90 dark:bg-gray-800/90 backdrop-blur-sm shadow-md p-4 z-30 hidden md:block overflow-y-auto border-r border-gray-200 dark:border-gray-700">

  <div class="space-y-2">
    <a href="https://leetcode.cn" target="_blank" class="flex items-center gap-2 p-2.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-sm dark:text-white transition-all"><span>📘</span>力扣 LeetCode</a>
    <a href="https://www.nowcoder.com" target="_blank" class="flex items-center gap-2 p-2.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-sm dark:text-white transition-all"><span>⚔️</span>牛客 OJ</a>
    <a href="https://codeforces.com" target="_blank" class="flex items-center gap-2 p-2.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-sm dark:text-white transition-all"><span>⚡</span>Codeforces</a>
    <a href="https://atcoder.jp" target="_blank" class="flex items-center gap-2 p-2.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-sm dark:text-white transition-all"><span>🔥</span>AtCoder</a>
    <a href="https://www.lanqiao.cn" target="_blank" class="flex items-center gap-2 p-2.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-sm dark:text-white transition-all"><span>🔵</span>蓝桥云课</a>
    <a href="https://www.luogu.com.cn" target="_blank" class="flex items-center gap-2 p-2.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-sm dark:text-white transition-all"><span>📕</span>洛谷</a>
  </div>

  
  <div class="mt-6 pt-5 border-t dark:border-gray-700">
    <div class="text-xs text-center text-gray-500 dark:text-gray-400 mb-3">点击人物 · 励志寄语</div>
    <div onclick="showQuote()" class="character text-center text-3xl mb-3 select-none">🐧</div>
    <div id="quoteBox" class="text-sm leading-relaxed text-center min-h-[56px] px-2 text-quote-light dark:text-quote-dark"></div>
  </div>

  <div class="mt-6 pt-4 border-t dark:border-gray-700 text-xs text-gray-400 text-center pb-2">
    <div id="userInfo" class="font-medium text-indigo-500 mb-1">未登录</div>
    专注算法 · 备战竞赛
  </div>
</div>


<div id="root" class="pt-4 md:ml-48"></div>

<script>

const quoteQueue = [
  "追风赶月莫停留，平芜尽处是春山",
  "路漫漫其修远兮，吾将上下而求索",
  "不经一番寒彻骨，怎得梅花扑鼻香",
  "长风破浪会有时，直挂云帆济沧海",
  "博观而约取，厚积而薄发"
];


function showQuote() {
  if(quoteQueue.length === 0) return;
  const curr = quoteQueue.shift();
  document.getElementById('quoteBox').innerText = curr;
  quoteQueue.push(curr);
}


const User = {
  getUsers(){return JSON.parse(localStorage.getItem('users')||'{}')},
  register(user,pwd){
    let u=this.getUsers();
    if(u[user])return false;
    u[user]={password:pwd};
    localStorage.setItem('users',JSON.stringify(u));
    localStorage.setItem('currentUser',user);
    return true;
  },
  login(user,pwd){
    let u=this.getUsers();
    if(u[user]&&u[user].password===pwd){
      localStorage.setItem('currentUser',user);
      return true;
    }
    return false;
  },
  current(){return localStorage.getItem('currentUser')||""},
  logout(){localStorage.removeItem('currentUser');location.reload();}
};


const Storage = {
  getKey(){return `study_${User.current()}`},
  save(val){
    if(!User.current()) return;
    localStorage.setItem(this.getKey(),JSON.stringify(val));
  },
  load(){
    if(!User.current()) return null;
    const res = localStorage.getItem(this.getKey());
    return res ? JSON.parse(res) : null;
  }
};

const today = new Date().toDateString();
const defaultState = {
  dark:false,lastCheckDate:"",streak:0,checkedIn:false,
  finished:[],wrongList:[],starList:[],studyTime:0,
  activeTab:"recommend",heat:Array(30).fill(0),tasks:[],
  taskInput:"",filter:{keyword:"",difficulty:0,tag:""},
  todayCount:0,page:1
};
let state = Storage.load() || {};
state = {...defaultState,...state};


if(state.lastCheckDate !== today){
  state.checkedIn = false;
  state.lastCheckDate = today;
  state.todayCount = 0;
  state.heat.shift();
  state.heat.push(0);
  save();
}


const fullData = [

function calcAcc(){
  const total = state.finished.length;
  const wrong = state.wrongList.length;
  return total ? Math.round((total - wrong) / total * 100) : 0;
}
function getAchievement(){
  const n = state.finished.length;
  if(n>=30) return"🏅算法大神";
  if(n>=20) return"🥇金牌选手";
  if(n>=10) return"🥈银牌选手";
  return"🌱新手入门";
}
function getFiltered(){
  let list = fullData;
  if(state.filter.keyword) list = list.filter(x=>x.title.includes(state.filter.keyword)||x.tags.some(t=>t.includes(state.filter.keyword)));
  if(state.filter.difficulty>0) list = list.filter(x=>x.difficulty===state.filter.difficulty);
  if(state.filter.tag) list = list.filter(x=>x.tags.includes(state.filter.tag));
  return list;
}


function render(){
  if(!User.current()){
    document.getElementById('loginModal').classList.remove('hidden');
  }else{
    document.getElementById('loginModal').classList.add('hidden');
  }

  document.getElementById('body').className = state.dark ? "bg-gray-900 text-white" : "bg-gray-100";
  document.getElementById('userInfo').innerText = User.current() || "未登录";
  document.getElementById('adminBtn').classList.toggle('hidden',User.current()!=='admin');
  document.getElementById('logoutBtn').classList.toggle('hidden',!User.current());

  const rec = getFiltered().filter(x=>!state.finished.includes(x.url)).slice(0,3);
  const acc = calcAcc(),ach = getAchievement();

  root.innerHTML=`
  <div class="max-w-5xl mx-auto p-4 space-y-4">
    <h1 class="text-2xl font-bold">🎯 凌云逐竞算法平台</h1>


    <div class="card bg-white/90 dark:bg-gray-800/90 p-6 rounded-xl shadow flex flex-col md:flex-row md:justify-between md:items-center gap-4 border border-gray-200 dark:border-gray-700">
      <div class="space-y-2">
        <div class="text-lg font-semibold text-indigo-600 dark:text-indigo-400">🏅 每日学习打卡</div>
        <div class="flex items-center gap-3 text-sm">
          <span>连续 <b class="text-indigo-600">${state.streak}</b> 天</span>
          <span>|</span>
          <span>${ach}</span>
          <span>|</span>
          <span>今日 ${state.todayCount} 题</span>
        </div>
      </div>
      <button onclick="checkIn()" class="px-5 py-2.5 rounded-lg text-white font-medium transition-all ${state.checkedIn?'bg-green-500':'bg-indigo-500'} shadow-lg">
        ${state.checkedIn?'✅ 已打卡':'📅 点击打卡'}
      </button>
    </div>

    <!-- 数据统计 -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div class="card bg-white/90 dark:bg-gray-800/90 p-4 rounded-xl shadow text-center border border-gray-200 dark:border-gray-700">
        <div class="text-sm text-gray-500 dark:text-gray-400">已完成</div>
        <div class="text-xl font-bold">${state.finished.length}</div>
      </div>
      <div class="card bg-white/90 dark:bg-gray-800/90 p-4 rounded-xl shadow text-center border border-gray-200 dark:border-gray-700">
        <div class="text-sm text-gray-500 dark:text-gray-400">错题</div>
        <div class="text-xl font-bold">${state.wrongList.length}</div>
      </div>
      <div class="card bg-white/90 dark:bg-gray-800/90 p-4 rounded-xl shadow text-center border border-gray-200 dark:border-gray-700">
        <div class="text-sm text-gray-500 dark:text-gray-400">正确率</div>
        <div class="text-xl font-bold">${acc}%</div>
      </div>
      <div class="card bg-white/90 dark:bg-gray-800/90 p-4 rounded-xl shadow text-center border border-gray-200 dark:border-gray-700">
        <div class="text-sm text-gray-500 dark:text-gray-400">学习时长</div>
        <div class="text-xl font-bold">${Math.floor(state.studyTime/60)}m</div>
      </div>
    </div>


    <div class="card bg-white/90 dark:bg-gray-800/90 p-4 rounded-xl shadow border border-gray-200 dark:border-gray-700">
      <div class="font-bold mb-3">🔥 智能刷题推荐</div>
      ${rec.map(p=>`
        <div class="flex justify-between py-2 border-b dark:border-gray-700">
          <span>${p.title}</span>
          <button onclick="openProblem('${p.url}')" class="text-indigo-500">查看</button>
        </div>
      `).join('')}
    </div>

  
    <div class="grid grid-cols-4 gap-2 bg-white/90 dark:bg-gray-800/90 p-2 rounded-xl border border-gray-200 dark:border-gray-700">
      <button onclick="setTab('recommend')" class="py-2 rounded-lg transition-all ${state.activeTab==='recommend'?'bg-gray-100 dark:bg-gray-700':''}">题库</button>
      <button onclick="setTab('tasks')" class="py-2 rounded-lg transition-all ${state.activeTab==='tasks'?'bg-gray-100 dark:bg-gray-700':''}">任务</button>
      <button onclick="setTab('wrong')" class="py-2 rounded-lg transition-all ${state.activeTab==='wrong'?'bg-gray-100 dark:bg-gray-700':''}">错题</button>
      <button onclick="setTab('dashboard')" class="py-2 rounded-lg transition-all ${state.activeTab==='dashboard'?'bg-gray-100 dark:bg-gray-700':''}">分析</button>
    </div>

    <div>${renderTab()}</div>
  </div>`;
}

/* 标签页渲染 */
function renderTab(){
  if(state.activeTab==='recommend'){
    return `<div class="card bg-white/90 dark:bg-gray-800/90 p-4 rounded-xl shadow border border-gray-200 dark:border-gray-700">
      <div class="flex flex-wrap gap-2 mb-3">
        <input placeholder="搜索题目/标签" oninput="state.filter.keyword=this.value;save()" class="flex-1 p-2.5 border-0 rounded-lg bg-gray-100 dark:bg-gray-700">
        <select onchange="state.filter.difficulty=Number(this.value);save()" class="p-2.5 border-0 rounded-lg bg-gray-100 dark:bg-gray-700">
          <option value="0">全部难度</option>
          <option value="1">简单</option>
          <option value="2">中等</option>
          <option value="3">困难</option>
          <option value="4">高阶</option>
        </select>
      </div>
      <div class="space-y-3 max-h-[500px] overflow-y-auto">
        ${getFiltered().map(p=>`
          <div class="p-3 border rounded-lg dark:border-gray-700 bg-gray-50/50 dark:bg-gray-900/20">
            <div class="font-bold">${p.title}</div>
            <div class="text-xs text-gray-500 dark:text-gray-400">#${p.tags[0]}</div>
            <div class="text-sm ${p.difficulty===1?'text-green-500':p.difficulty===2?'text-yellow-500':p.difficulty===3?'text-orange-500':'text-red-500'}">难度 ${p.difficulty}</div>
            <div class="flex gap-3 mt-2 text-sm flex-wrap">
              <button onclick="openProblem('${p.url}')" class="text-indigo-500">详情</button>
              <button onclick="toggleFinish('${p.url}')" class="${state.finished.includes(p.url)?"text-green-600":"text-gray-400"}">完成</button>
              <button onclick="toggleWrong('${p.url}')" class="${state.wrongList.includes(p.url)?"text-red-600":"text-gray-400"}">错题</button>
              <button onclick="toggleStar('${p.url}')" class="${(state.starList||[]).includes(p.url)?"text-yellow-600":"text-gray-400"}">收藏</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }

  if(state.activeTab==='tasks'){
    return `<div class="card bg-white/90 dark:bg-gray-800/90 p-4 rounded-xl shadow border border-gray-200 dark:border-gray-700">
      <div class="flex gap-2 mb-3">
        <input id="taskInput" value="${state.taskInput}" oninput="state.taskInput=this.value" placeholder="输入算法学习任务" class="flex-1 p-2.5 border-0 rounded-lg bg-gray-100 dark:bg-gray-700">
        <button onclick="addTask()" class="px-3 py-2.5 bg-indigo-500 text-white rounded-lg shadow">添加</button>
      </div>
      <div class="space-y-2">
        ${state.tasks.map((t,i)=>`
          <label class="flex items-center gap-2 p-2.5 bg-gray-50 dark:bg-gray-700/50 rounded-lg">
            <input type="checkbox" ${t.done?"checked":""} onchange="toggleTask(${i})">
            <span class="${t.done?"line-through text-gray-400":""}">${t.text}</span>
          </label>
        `).join('')}
      </div>
    </div>`;
  }

  if(state.activeTab==='wrong'){
    return `<div class="card bg-white/90 dark:bg-gray-800/90 p-4 rounded-xl shadow space-y-4 border border-gray-200 dark:border-gray-700">
      <div>
        <div class="font-bold mb-2">📕 错题本</div>
        ${fullData.filter(p=>state.wrongList.includes(p.url)).map(p=>`
          <div class="p-2.5 bg-red-50 dark:bg-red-900/30 rounded-lg mb-1 flex justify-between">
            <span>${p.title}</span>
            <button onclick="redoWrong('${p.url}')" class="text-xs bg-green-500 text-white px-2 py-1 rounded">已掌握</button>
          </div>
        `).join('')}
      </div>
      <div>
        <div class="font-bold mb-2">⭐ 收藏题库</div>
        ${fullData.filter(p=>(state.starList||[]).includes(p.url)).map(p=>`<div class="p-2.5 bg-yellow-50 dark:bg-yellow-900/30 rounded-lg mb-1">${p.title}</div>`).join('')}
      </div>
    </div>`;
  }

  if(state.activeTab==='dashboard'){
    return `<div class="card bg-white/90 dark:bg-gray-800/90 p-4 rounded-xl shadow space-y-4 border border-gray-200 dark:border-gray-700">
      <div class="text-sm bg-indigo-50 dark:bg-indigo-900/30 p-3 rounded-lg">
        📊 学习建议：${calcAcc()<60?"基础薄弱，优先练习简单中等题":calcAcc()<85?"稳步提升，强化模板与思维":"基础扎实，冲刺高阶竞赛题目"}
      </div>
      <div class="h-64"><canvas id="chart"></canvas></div>
      <div class="text-center">总题库：${fullData.length} 道 | 已完成：${state.finished.length} 道</div>
    </div>`;
  }

  if(state.activeTab==='admin'){
    return `<div class="card bg-white/90 dark:bg-gray-800/90 p-4 rounded-xl shadow border border-gray-200 dark:border-gray-700">
      <div class="font-bold mb-3">管理员后台 - 题目管理</div>
      <input id="newTitle" placeholder="题目标题" class="w-full p-2.5 mb-2 border-0 rounded-lg bg-gray-100 dark:bg-gray-700">
      <input id="newContent" placeholder="题目描述" class="w-full p-2.5 mb-2 border-0 rounded-lg bg-gray-100 dark:bg-gray-700">
      <button onclick="addProblem()" class="bg-indigo-500 text-white p-2.5 rounded-lg w-full shadow">添加自定义题目</button>
    </div>`;
  }
  return "";
}


function setTab(t){state.activeTab=t;save();}
function toggleDark(){state.dark=!state.dark;save();}

// 打卡 重复拦截
function checkIn(){
  if(state.checkedIn) return;
  state.checkedIn = true;
  state.streak += 1;
  state.heat.shift();
  state.heat.push(1);
  save();
}


function toggleFinish(url){
  if(state.finished.includes(url)){
    state.finished = state.finished.filter(x=>x!==url);
  }else{
    state.finished.push(url);
    state.todayCount += 1;
  }
  save();
}


function toggleWrong(url){
  if(state.wrongList.includes(url)){
    state.wrongList = state.wrongList.filter(x=>x!==url);
  }else{
    state.wrongList.push(url);
  }
  save();
}


function toggleStar(url){
  if(!state.starList) state.starList = [];
  if(state.starList.includes(url)){
    state.starList = state.starList.filter(x=>x!==url);
  }else{
    state.starList.push(url);
  }
  save();
}

function addTask(){
  if(!state.taskInput.trim()) return;
  state.tasks.push({text:state.taskInput.trim(),done:false});
  state.taskInput = "";
  save();
}
function toggleTask(i){state.tasks[i].done=!state.tasks[i].done;save();}
function redoWrong(url){state.wrongList=state.wrongList.filter(x=>x!==url);save();}


function userLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPwd').value.trim();
  if(!u||!p){
    document.getElementById('loginMsg').innerText="账号密码不能为空";
    return;
  }
  if(User.login(u,p)){save();render();}
  else{document.getElementById('loginMsg').innerText="账号或密码错误";}
}
function userRegister(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPwd').value.trim();
  if(!u||!p){
    document.getElementById('loginMsg').innerText="账号密码不能为空";
    return;
  }
  if(User.register(u,p)){save();render();}
  else{document.getElementById('loginMsg').innerText="用户名已存在";}
}
function logout(){User.logout();}

function openProblem(url){
  const p = fullData.find(x=>x.url===url);
  document.getElementById('problemDetail').innerHTML=`
    <div class="font-bold text-lg">${p.title}</div>
    <div class="my-2 text-sm">难度 ${p.difficulty} | ${p.tags[0]}</div>
    <div class="p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg">${p.content}</div>
    <a href="${p.url}" target="_blank" class="inline-block mt-3 text-indigo-500">前往原题链接</a>
  `;
  document.getElementById('problemModal').classList.remove('hidden');
}
function closeProblem(){document.getElementById('problemModal').classList.add('hidden');}
function addProblem(){
  const t=document.getElementById('newTitle').value;
  const c=document.getElementById('newContent').value;
  if(!t||!c)return;
  fullData.push({title:t,difficulty:2,url:"#",tags:["自定义"],content:c});
  save();render();
}


function save(){Storage.save(state);render();setTimeout(drawChart,100);}
function drawChart(){
  const ctx=document.getElementById('chart');
  if(!ctx)return;
  new Chart(ctx,{
    type:'line',
    data:{
      labels:Array.from({length:30},(_,i)=>i+1),
      datasets:[{
        label:'30天学习热度',
        data:state.heat,
        borderColor:'#6366f1',
        backgroundColor:'#6366f133',
        tension:0.4,fill:true
      }]
    },
    options:{responsive:true,maintainAspectRatio:false}
  });
}


setInterval(()=>{
  if(User.current()){
    state.studyTime = (state.studyTime||0)+1;
    Storage.save(state);
  }
},60000);


setTimeout(()=>{
  document.getElementById('loading').style.display='none';
  render();
  
  if(quoteQueue.length>0){
    document.getElementById('quoteBox').innerText = quoteQueue[0];
  }
},400);
</script>
</body>
</html>
